name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:       # allows manual run

permissions:
  contents: write          # REQUIRED to push files

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Vaishnavi-KN16
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange&color_dots=#161b22,#40c463,#30a14e,#216e39,#0e4429
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=cyan&color_dots=#000000,#0e4429,#006d32,#26a641,#39d353

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
